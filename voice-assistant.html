<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Executive Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0f172a 100%);
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            border-bottom: 1px solid rgba(59, 130, 246, 0.3);
            background: linear-gradient(to right, #0f172a, #1e3a8a);
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 1rem;
            max-width: 60rem;
            margin: 0 auto;
        }

        .header-icon {
            position: relative;
            width: 2rem;
            height: 2rem;
            color: #60a5fa;
        }

        .pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .header p {
            font-size: 0.875rem;
            color: #93c5fd;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 60rem;
            margin: 0 auto;
            padding: 1.5rem;
            width: 100%;
            overflow: hidden;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .message {
            display: flex;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 80%;
            padding: 1rem;
            border-radius: 0.5rem;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
        }

        .message.assistant .message-bubble {
            background: #1e293b;
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #e0f2fe;
        }

        .message-time {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 0.5rem;
        }

        .transcript-display {
            background: rgba(30, 58, 138, 0.3);
            border: 1px solid rgba(59, 130, 246, 0.5);
            border-radius: 0.5rem;
            padding: 1rem;
            margin-bottom: 1rem;
            display: none;
        }

        .transcript-display.show {
            display: block;
        }

        .transcript-display strong {
            color: #60a5fa;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .button-group {
            display: flex;
            gap: 0.75rem;
        }

        button {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .mic-button {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }

        .mic-button:hover:not(:disabled) {
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.5);
            transform: translateY(-2px);
        }

        .mic-button.listening {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            animation: pulse 0.5s ease-in-out infinite;
        }

        .mic-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .control-buttons {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .control-buttons button {
            flex: 0 1 auto;
            padding: 0.5rem 1rem;
            background: #1e293b;
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: white;
            font-size: 0.875rem;
        }

        .control-buttons button:hover {
            background: #334155;
            border-color: rgba(59, 130, 246, 0.5);
        }

        .status-indicator {
            text-align: center;
            font-size: 0.875rem;
            color: #94a3b8;
            margin-top: 1rem;
        }

        .loading-dots {
            display: inline-flex;
            gap: 0.25rem;
        }

        .dot {
            width: 0.5rem;
            height: 0.5rem;
            background: #60a5fa;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% { opacity: 0.5; }
            40% { opacity: 1; }
        }

        input {
            flex: 1;
            padding: 0.75rem;
            background: #1e293b;
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: rgba(59, 130, 246, 0.6);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        input::placeholder {
            color: #64748b;
        }

        .text-input-group {
            display: flex;
            gap: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <div class="header-icon pulse">📋</div>
                <div>
                    <h1>Executive Assistant</h1>
                    <p>Voice-enabled • Always listening</p>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Messages -->
            <div class="messages-container" id="messagesContainer">
                <div class="message assistant">
                    <div class="message-bubble">
                        <p>Good morning. I'm your executive assistant. Ask me about your schedule, briefing, emails, tasks, or anything else you need.</p>
                        <div class="message-time" id="time1"></div>
                    </div>
                </div>
            </div>

            <!-- Transcript -->
            <div class="transcript-display" id="transcriptDisplay">
                <p><strong>Listening:</strong> <span id="transcriptText">Awaiting speech...</span></p>
            </div>

            <!-- Controls -->
            <div class="controls">
                <!-- Voice Button -->
                <div class="button-group">
                    <button class="mic-button" id="micButton" onclick="toggleListening()">
                        <span id="micIcon">🎤</span>
                        <span id="micText">Tap Microphone & Speak</span>
                    </button>
                </div>

                <!-- Text Input -->
                <div class="text-input-group">
                    <input type="text" id="textInput" placeholder="(Optional) Type instead of speaking..." onkeypress="if(event.key === 'Enter') sendMessage();">
                    <button onclick="sendMessage()" style="flex: 0 0 auto; padding: 0.75rem 1.5rem;">Send</button>
                </div>

                <!-- Control Buttons -->
                <div class="control-buttons">
                    <button onclick="clearChat()">Clear Chat</button>
                    <button onclick="copyTranscript()">Copy Transcript</button>
                    <button id="muteButton" onclick="toggleMute()">Mute</button>
                </div>

                <!-- Status -->
                <div class="status-indicator" id="statusIndicator">
                    ✓ Ready • Say "Good morning" or "Give me my briefing"
                </div>
            </div>
        </div>
    </div>

    <script>
        let isListening = false;
        let isSpeaking = false;
        let transcript = '';
        let messages = [];
        let recognition = null;
        let isMuted = false;
        const CRM_KEY = 'boes_crm_v2';

        // Initialize Speech Recognition
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                isListening = true;
                transcript = '';
                updateUI();
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcriptSegment = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        transcript += transcriptSegment + ' ';
                    } else {
                        interimTranscript += transcriptSegment;
                    }
                }
                if (interimTranscript) {
                    document.getElementById('transcriptDisplay').classList.add('show');
                    document.getElementById('transcriptText').textContent = transcript + interimTranscript;
                }
            };

            recognition.onend = () => {
                isListening = false;
                if (transcript.trim()) {
                    const finalTranscript = transcript;
                    setTimeout(() => sendMessage(finalTranscript), 300);
                }
                transcript = '';
                document.getElementById('transcriptDisplay').classList.remove('show');
                updateUI();
            };

            recognition.onerror = (event) => {
                console.error('Speech error:', event.error);
                isListening = false;
                updateUI();
            };
        }

        function toggleListening() {
            if (!recognition) {
                alert('Speech Recognition not supported in your browser');
                return;
            }
            if (isListening) {
                recognition.stop();
            } else {
                recognition.start();
            }
        }

        function updateUI() {
            const button = document.getElementById('micButton');
            const icon = document.getElementById('micIcon');
            const text = document.getElementById('micText');
            const status = document.getElementById('statusIndicator');

            if (isListening) {
                button.classList.add('listening');
                icon.textContent = '🎤';
                text.textContent = 'Listening... (Stop to Submit)';
                status.textContent = '🎤 Listening...';
            } else if (isSpeaking) {
                status.textContent = '🔊 Speaking...';
                button.classList.remove('listening');
            } else {
                button.classList.remove('listening');
                icon.textContent = '🎤';
                text.textContent = 'Tap Microphone & Speak';
                status.textContent = '✓ Ready • Say "Good morning" or "Give me my briefing"';
            }
        }

        function getCRMData() {
            try {
                const data = localStorage.getItem(CRM_KEY);
                return data ? JSON.parse(data) : null;
            } catch (e) {
                return null;
            }
        }

        function generateBriefing() {
            const crmData = getCRMData();
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });

            const contacts = crmData?.contacts?.length || 0;
            const tasks = crmData?.tasks?.filter(t => t.status === 'Open')?.length || 0;
            const topTasks = crmData?.tasks?.filter(t => t.status === 'Open')?.slice(0, 3) || [];

            let briefing = `Good morning. Here is your executive briefing for ${dateStr}.\n\n`;
            briefing += `CRM Status:\n`;
            briefing += `You have ${contacts} contacts in your system.\n`;
            briefing += `Open tasks: ${tasks}\n`;

            if (topTasks.length > 0) {
                briefing += `\nTop priorities:\n`;
                topTasks.forEach(t => briefing += `- ${t.title}\n`);
            }

            briefing += `\nYour system is ready for the day. What would you like to focus on first?`;

            return briefing;
        }

        async function sendMessage(text = '') {
            const messageText = text || document.getElementById('textInput').value;
            if (!messageText.trim()) return;

            // Add user message
            addMessage(messageText, 'user');
            document.getElementById('textInput').value = '';

            // Generate response
            const isBriefing = /briefing|brief|morning|status|overview|summary|what do i have|what's happening/i.test(messageText);
            let response = '';

            if (isBriefing) {
                response = generateBriefing();
            } else if (/task|todo|to do/i.test(messageText)) {
                const crmData = getCRMData();
                const tasks = crmData?.tasks?.filter(t => t.status === 'Open') || [];
                response = `You have ${tasks.length} open tasks. ${tasks.length > 0 ? `Your top task is: ${tasks[0].title}` : 'No open tasks. Good work!'}`;
            } else if (/email|message/i.test(messageText)) {
                response = 'Your email assistant is integrated and monitoring terry@boesandboes.com for important messages.';
            } else if (/contact|lead|prospect/i.test(messageText)) {
                const crmData = getCRMData();
                response = `You have ${crmData?.contacts?.length || 0} contacts in your system.`;
            } else if (/schedule|meeting|calendar/i.test(messageText)) {
                response = 'I\'m integrated with your Google Calendar. What would you like to do?';
            } else {
                response = `I understand you want to know about "${messageText}". I'm your executive assistant. What specific information do you need?`;
            }

            // Add assistant message
            addMessage(response, 'assistant');

            // Speak response
            if (!isMuted) {
                await speakText(response);
            }
        }

        function addMessage(text, type) {
            const now = new Date();
            const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const container = document.getElementById('messagesContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = `
                <div class="message-bubble">
                    <p>${text}</p>
                    <div class="message-time">${timeStr}</div>
                </div>
            `;
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        function speakText(text) {
            return new Promise((resolve) => {
                if ('speechSynthesis' in window) {
                    speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.rate = 1;
                    utterance.pitch = 1;
                    utterance.volume = 1;

                    utterance.onstart = () => {
                        isSpeaking = true;
                        updateUI();
                    };

                    utterance.onend = () => {
                        isSpeaking = false;
                        updateUI();
                        resolve();
                    };

                    speechSynthesis.speak(utterance);
                } else {
                    resolve();
                }
            });
        }

        function clearChat() {
            document.getElementById('messagesContainer').innerHTML = `
                <div class="message assistant">
                    <div class="message-bubble">
                        <p>Good morning. I'm your executive assistant. Ask me about your schedule, briefing, emails, tasks, or anything else you need.</p>
                        <div class="message-time"></div>
                    </div>
                </div>
            `;
        }

        function copyTranscript() {
            const container = document.getElementById('messagesContainer');
            const text = Array.from(container.querySelectorAll('.message-bubble p')).map(p => p.textContent).join('\n\n');
            navigator.clipboard.writeText(text);
            alert('Conversation copied to clipboard');
        }

        function toggleMute() {
            isMuted = !isMuted;
            const button = document.getElementById('muteButton');
            button.textContent = isMuted ? 'Unmute' : 'Mute';
            speechSynthesis.cancel();
        }

        // Set initial times
        document.getElementById('time1').textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        updateUI();
    </script>
</body>
</html>
